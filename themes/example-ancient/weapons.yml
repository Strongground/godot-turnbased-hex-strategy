# Weapons for the ancient warfare theme

# Melee weapon for legionaries
# Range 1 means adjacent tiles only

gladius:
  display_name: 'Gladius'
  description: 'Short Roman sword optimized for close combat.'
  use_ammo: false
  attack_strength: 3
  armor_piercing: 1
  explosive: 0
  attacks_units: ['LAND']
  area_of_effect: 0
  aoe_falloff: 0
  range: 1
  effect: 'melee_swing'
  effect_impact: 'melee_hit'
  sound: 'sounds/sfx/weapons/sword_swing.wav'
  sound_impact: 'sounds/sfx/weapons/sword_hit.wav'

